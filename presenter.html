<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PuzzleGame Presenter</title>
    <meta name="theme-color" content="#0a7f6f" />
    <link rel="stylesheet" href="./styles.css?v=20260420a" />
  </head>
  <body class="presenter-body">
    <div class="presenter-shell">
      <section class="presenter-hero">
        <p class="eyebrow">HOST MODE</p>
        <h1>AI Lab Talent Sprint</h1>
        <p class="presenter-copy">
          用主持頁集中管理掃碼入口與現場排行榜。現在除了場景切換，也可以直接指定第五場景的題組導流，讓 QR code 更貼近真實活動流程。
        </p>
        <div class="presenter-meta">
          <span id="presenter-mode" class="meta-chip">排行榜模式</span>
          <span class="meta-chip">QR 導流模式</span>
        </div>
      </section>

      <section class="presenter-grid">
        <div class="presenter-card presenter-qr-card">
          <p class="mini-label">SCAN TO PLAY</p>
          <h2>掃碼開始活動</h2>
          <p id="presenter-scene-label" class="presenter-scene-label"></p>
          <div class="stack-lg presenter-config">
            <label class="field">
              <span>導流場景</span>
              <div id="presenter-scene" class="preset-toggle presenter-scene-toggle" role="group" aria-label="導流場景"></div>
            </label>
            <label class="field">
              <span>題組導流</span>
              <div id="presenter-module" class="preset-toggle presenter-scene-toggle" role="group" aria-label="題組導流"></div>
              <small id="presenter-module-hint" class="field-hint"></small>
            </label>
            <label class="field">
              <span>公開活動網址</span>
              <input id="presenter-base-url" type="url" />
              <small class="field-hint">請填可讓學生手機連線的公開網址，不要使用 127.0.0.1。</small>
            </label>
            <label class="field">
              <span>導流模式</span>
              <div id="presenter-entry-mode" class="preset-toggle presenter-scene-toggle" role="group" aria-label="導流模式"></div>
              <small id="presenter-entry-mode-hint" class="field-hint"></small>
            </label>
          </div>
          <img id="presenter-qr" class="presenter-qr" alt="活動 QR Code" />
          <p id="presenter-url" class="presenter-url"></p>
        </div>

        <div class="presenter-card presenter-board-card">
          <div class="leaderboard-page-head">
            <div>
              <p class="mini-label">LIVE RANKING</p>
              <h2 id="presenter-board-title">目前排行榜</h2>
              <p id="presenter-board-copy" class="presenter-url"></p>
            </div>
            <div class="leaderboard-actions">
              <button id="refresh-presenter" class="ghost-button" type="button">立即更新</button>
              <a class="ghost-button link-button" href="./leaderboard.html">獨立排行榜頁</a>
            </div>
          </div>
          <ol id="presenter-board" class="leaderboard-list leaderboard-list-presenter"></ol>
        </div>
      </section>
    </div>

    <script src="./config.js?v=20260420a"></script>
    <script src="./leaderboard-shared.js?v=20260420a"></script>
    <script src="./scene-registry.js?v=20260420a"></script>
    <script src="./presenter.js?v=20260420a"></script>
  </body>
</html>
